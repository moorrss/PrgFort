<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eShop — Koddokumentation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e14;--s1:#111318;--s2:#181c24;--s3:#1e2330;--b1:#252c3d;--b2:#2e3850;
  --blue:#4d7cfe;--bdim:rgba(77,124,254,.1);--green:#3ecf8e;--gdim:rgba(62,207,142,.1);
  --ora:#f5a623;--odim:rgba(245,166,35,.1);--red:#f03e3e;--rdim:rgba(240,62,62,.1);
  --pur:#9775fa;--pudim:rgba(151,117,250,.1);--cya:#22d3ee;--pnk:#f472b6;
  --tx:#e2e8f4;--txd:#8892a4;--txm:#3d4a5c;
  --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans)}
.app{display:flex;height:100vh;flex-direction:column}
.topbar{height:54px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue);white-space:nowrap}
.logo em{color:var(--txd);font-style:normal}
.sb{flex:1;max-width:540px;position:relative}
.sb input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 34px;font-family:var(--mono);font-size:13px;color:var(--tx);outline:none;transition:border-color .2s,box-shadow .2s}
.sb input::placeholder{color:var(--txm)}
.sb input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bdim)}
.sb .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txm);pointer-events:none;font-size:13px}
.sb .clr{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txm);cursor:pointer;font-size:18px;display:none}
.sb .clr.on{display:block}
.aibtn{display:flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.aibtn:hover{opacity:.85}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:212px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;padding:12px 0 24px}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.sh{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txm);padding:10px 14px 4px;text-transform:uppercase}
.si{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;border-left:2px solid transparent;color:var(--txd);transition:all .15s;user-select:none}
.si:hover{background:var(--s2);color:var(--tx)}
.si.act{border-left-color:var(--blue);background:var(--bdim);color:var(--blue)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:22px 26px}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
.aip{position:fixed;right:0;top:54px;bottom:0;width:400px;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20}
.aip.open{transform:translateX(0)}
.aiphd{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.aiphd .tit{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.xbtn{background:none;border:none;color:var(--txd);font-size:20px;cursor:pointer}
.xbtn:hover{color:var(--tx)}
.aimsgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.aimsgs::-webkit-scrollbar{width:3px}
.aimsgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.msg{padding:11px 13px;border-radius:10px;font-size:13px;line-height:1.65}
.msg.user{background:var(--bdim);border:1px solid rgba(77,124,254,.2);color:var(--tx);align-self:flex-end;max-width:88%}
.msg.bot{background:var(--s2);border:1px solid var(--b1);color:var(--tx)}
.msg.bot pre{margin:10px 0 0;background:var(--bg);border:1px solid var(--b1);border-radius:7px;padding:12px;font-family:var(--mono);font-size:12px;overflow-x:auto;line-height:1.75;color:var(--tx)}
.msg.bot code{font-family:var(--mono);font-size:12px;background:var(--s3);padding:1px 5px;border-radius:3px}
.msg.ld{color:var(--txd);font-style:italic}
.aiia{padding:12px 18px;border-top:1px solid var(--b1);display:flex;gap:9px}
.aiia textarea{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:9px 11px;color:var(--tx);font-family:var(--sans);font-size:13px;resize:none;outline:none;height:68px;transition:border-color .2s}
.aiia textarea:focus{border-color:var(--blue)}
.aiia textarea::placeholder{color:var(--txm)}
.sndbtn{background:var(--blue);border:none;border-radius:8px;padding:0 13px;color:#fff;cursor:pointer;font-size:17px;align-self:flex-end;height:36px}
.sndbtn:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:16px;overflow:hidden;animation:fi .22s ease both}
.chd{padding:13px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
.ctit{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.tag{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.tctrl{background:var(--bdim);color:var(--blue);border:1px solid rgba(77,124,254,.2)}
.ten{background:var(--gdim);color:var(--green);border:1px solid rgba(62,207,142,.2)}
.tif{background:var(--pudim);color:var(--pur);border:1px solid rgba(151,117,250,.2)}
.trp{background:var(--odim);color:var(--ora);border:1px solid rgba(245,166,35,.2)}
.tsv{background:rgba(34,211,238,.1);color:var(--cya);border:1px solid rgba(34,211,238,.2)}
.tdt{background:rgba(110,231,183,.1);color:#6ee7b7;border:1px solid rgba(110,231,183,.2)}
.tdto{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.tkw{background:rgba(244,114,182,.1);color:var(--pnk);border:1px solid rgba(244,114,182,.2)}
.tpg{background:rgba(232,121,249,.1);color:#e879f9;border:1px solid rgba(232,121,249,.2)}
.cbd{padding:15px 18px}
.desc{font-size:13.5px;color:var(--txd);line-height:1.7;margin-bottom:14px}
.methods{display:flex;flex-direction:column;gap:7px}
.method{background:var(--s2);border:1px solid var(--b1);border-radius:8px;overflow:hidden}
.mhd{padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.mhd:hover{background:var(--s3)}
.verb{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;width:52px;text-align:center}
.vget{background:rgba(62,207,142,.15);color:var(--green)}
.vpost{background:var(--bdim);color:var(--blue)}
.vput{background:var(--odim);color:var(--ora)}
.vdel{background:var(--rdim);color:var(--red)}
.vpatch{background:rgba(34,211,238,.12);color:var(--cya)}
.vno{background:var(--s3);color:var(--txd)}
.mname{font-family:var(--mono);font-size:13px;flex:1;color:var(--tx)}
.mroute{font-family:var(--mono);font-size:11px;color:var(--txm)}
.marr{color:var(--txm);font-size:11px;transition:transform .2s}
.marr.open{transform:rotate(90deg)}
.mbd{display:none;padding:13px;border-top:1px solid var(--b1)}
.mbd.open{display:block}
.mdesc{font-size:13px;color:var(--txd);line-height:1.65;margin-bottom:11px}
.codewrap{position:relative}
.codewrap pre{background:#080a0f;border:1px solid var(--b1);border-radius:8px;padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.75;color:#c9d1e0;white-space:pre}
.cpbtn{position:absolute;top:8px;right:8px;background:var(--s2);border:1px solid var(--b1);border-radius:5px;color:var(--txd);font-family:var(--sans);font-size:11px;padding:3px 9px;cursor:pointer}
.cpbtn:hover{background:var(--s3);color:var(--tx)}
.ptit{font-size:21px;font-weight:700;margin-bottom:5px}
.psub{font-size:13.5px;color:var(--txd);margin-bottom:22px}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.scard{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:14px}
.snum{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--blue)}
.slbl{font-size:11.5px;color:var(--txd);margin-top:3px}
.tip{background:rgba(77,124,254,.06);border:1px solid rgba(77,124,254,.15);border-radius:8px;padding:11px 14px;font-size:12.5px;color:var(--txd);margin-bottom:16px;line-height:1.6}
.tip strong{color:var(--blue)}
.rh{font-size:13px;color:var(--txm);margin-bottom:14px}
.rh strong{color:var(--tx)}
.ri{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:border-color .2s;animation:fi .18s ease both}
.ri:hover{border-color:var(--blue)}
.ritit{font-family:var(--mono);font-size:13px;font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.risub{font-size:12.5px;color:var(--txd);line-height:1.5}
mark{background:rgba(77,124,254,.25);color:#93b4ff;border-radius:2px;padding:0 2px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.fcrd{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:15px;cursor:pointer;transition:border-color .2s,transform .15s;animation:fi .22s ease both}
.fcrd:hover{border-color:var(--blue);transform:translateY(-2px)}
.pill{font-family:var(--mono);font-size:10px;padding:2px 7px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;color:var(--txm)}
.deep-section{margin-bottom:18px}
.deep-section h3{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:8px}
.deep-section p{font-size:13.5px;color:var(--txd);line-height:1.75;margin-bottom:8px}
.deep-section p strong{color:var(--tx);font-weight:600}
.analogy{background:rgba(77,124,254,.06);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px;margin:10px 0;font-size:13px;color:var(--txd);line-height:1.65}
.analogy em{color:var(--blue);font-style:normal;font-weight:600}
.why-box{background:rgba(62,207,142,.06);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:12px 14px;margin:10px 0;font-size:13px;color:var(--txd);line-height:1.65}
.steps-list{display:flex;flex-direction:column;gap:7px;margin:10px 0}
.step{display:flex;align-items:flex-start;gap:10px}
.snum2{flex-shrink:0;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-top:1px}
.step-txt{font-size:13px;color:var(--txd);line-height:1.55;padding-top:4px}
.step-txt strong{color:var(--tx)}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.compare-box{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px}
.compare-box h4{font-size:12px;font-weight:600;margin-bottom:7px}
.compare-box li{font-size:12px;color:var(--txd);padding-left:14px;position:relative;line-height:1.5;list-style:none}
.compare-box li::before{content:'•';position:absolute;left:0;color:var(--txm)}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.typing::after{content:'▋';animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="logo">eShop<em>.docs</em></div>
  <div class="sb">
    <span class="ico">&#8981;</span>
    <input type="text" id="SI" placeholder="Sök: async, dto, interface, repository, jwt, record, linq ..."/>
    <button class="clr" id="CLR" onclick="clrSearch()">&#215;</button>
  </div>
  <button class="aibtn" onclick="toggleAI()">&#10022; Fråga AI</button>
</div>
<div class="body">
<div class="sidebar" id="SIDEBAR"></div>
<div class="main" id="MAIN"></div>
<div class="aip" id="AIP">
  <div class="aiphd">
    <div class="tit">&#10022; AI-assistent</div>
    <button class="xbtn" onclick="toggleAI()">&#215;</button>
  </div>
  <div class="aimsgs" id="AIMSGS">
    <div class="msg bot">Hej! Fråga om eShop-projektet eller C#-begrepp.<br><br>
    <em>Vad är en DTO?</em> · <em>Hur fungerar async?</em> · <em>Vad gör Repository Pattern?</em> · <em>Förklara JWT</em>
    </div>
  </div>
  <div class="aiia">
    <textarea id="AIINP" placeholder="Skriv din fråga..." onkeydown="aiKey(event)"></textarea>
    <button class="sndbtn" id="SNDBTN" onclick="sendAI()">&#10148;</button>
  </div>
</div>
</div>
</div>
<script>
// ─── HELPERS ──────────────────────────────────────────────────────────────────
const H = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const esc = s => String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

function mkCode(raw) {
  const id = 'c' + Math.random().toString(36).slice(2,8);
  const div = document.createElement('div');
  div.className = 'codewrap';
  const pre = document.createElement('pre');
  pre.id = id;
  pre.textContent = raw;
  const btn = document.createElement('button');
  btn.className = 'cpbtn';
  btn.textContent = 'Kopiera';
  btn.onclick = function() {
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = '✓ OK';
      setTimeout(() => btn.textContent = 'Kopiera', 1800);
    });
  };
  div.appendChild(pre);
  div.appendChild(btn);
  const wrap = document.createElement('div');
  wrap.appendChild(div);
  return wrap.innerHTML;
}

function vcls(v) {
  return {GET:'vget',POST:'vpost',PUT:'vput',DELETE:'vdel',PATCH:'vpatch'}[v] || 'vno';
}

function renderMethods(methods) {
  let html = '<div class="methods">';
  methods.forEach(m => {
    html += '<div class="method">';
    html += '<div class="mhd" onclick="toggleM(this)">';
    html += '<span class="verb ' + vcls(m.verb) + '">' + H(m.verb||'—') + '</span>';
    html += '<span class="mname">' + H(m.name) + '</span>';
    html += '<span class="mroute">' + H(m.route||'') + '</span>';
    html += '<span class="marr">&#9654;</span>';
    html += '</div>';
    html += '<div class="mbd">';
    html += '<div class="mdesc">' + H(m.desc) + '</div>';
    html += mkCode(m.code);
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function toggleM(el) {
  const b = el.nextElementSibling;
  const a = el.querySelector('.marr');
  const o = b.classList.toggle('open');
  a.classList.toggle('open', o);
}

// ─── PAGES DATA ───────────────────────────────────────────────────────────────
const PAGES = {
  AuthCtrl: {
    title:'AuthController', file:'Controllers/AuthController.cs',
    tagCls:'tctrl', tagLbl:'Controller', route:'api/auth',
    desc:'Hanterar autentisering: registrering, inloggning och rollhantering. Använder ASP.NET Identity via UserManager och RoleManager. Primary Constructor injectar tre tjänster.',
    methods:[
      {verb:'POST',route:'api/auth/register',name:'RegisterUser',
       desc:'Skapar ny användare, skapar rollen "User" om den saknas, och returnerar JWT-token. Returnerar 201.',
       code:'[AllowAnonymous]\n[HttpPost("register")]\npublic async Task<ActionResult> RegisterUser(PostRegisterUser model)\n{\n    var user = new User {\n        Email = model.Email,\n        UserName = model.Email,\n        PhoneNumber = model.Phone,\n        FirstName = model.FirstName,\n        LastName = model.LastName\n    };\n    var result = await userManager.CreateAsync(user, model.Password);\n    if (!result.Succeeded) return StatusCode(500, result.Errors);\n\n    var role = await roleManager.FindByNameAsync("User");\n    if (role is null)\n        await roleManager.CreateAsync(new IdentityRole { Name = "User" });\n    await userManager.AddToRoleAsync(user, "User");\n\n    var token = await tokenService.CreateToken(user);\n    return StatusCode(201, new { user.Email, token });\n}'},
      {verb:'POST',route:'api/auth/login',name:'LoginUser',
       desc:'Loggar in via e-post (som är UserName). Kontrollerar lösenord. Returnerar JWT eller 401.',
       code:'[AllowAnonymous]\n[HttpPost("login")]\npublic async Task<ActionResult> LoginUser(PostLoginUser model)\n{\n    var user = await userManager.FindByNameAsync(model.Email);\n    if (user is null || !await userManager.CheckPasswordAsync(user, model.Password))\n        return Unauthorized(new { Success = false, message = "Felaktig inloggning..." });\n\n    var token = await tokenService.CreateToken(user);\n    return Ok(new { Success = true, user.Email, token });\n}'},
      {verb:'POST',route:'api/auth/role?roleName=X',name:'CreateRole',
       desc:'Skapar ny roll. Kräver Admin-policy. Idempotent.',
       code:'[Authorize(Policy = "RequireAdminRights")]\n[HttpPost("role")]\npublic async Task<ActionResult> CreateRole([FromQuery] string roleName)\n{\n    var role = await roleManager.FindByNameAsync(roleName);\n    if (role is null) {\n        role = new IdentityRole { Name = roleName };\n        await roleManager.CreateAsync(role);\n    }\n    return StatusCode(201);\n}'}
    ]
  },
  ProdCtrl: {
    title:'ProductsController', file:'Controllers/ProductsController.cs',
    tagCls:'tctrl', tagLbl:'Controller', route:'api/products',
    desc:'Hanterar produkter via IProductRepository. Controllern vet ingenting om EF Core — all databas-logik i ProductRepository.',
    methods:[
      {verb:'GET',route:'api/products',name:'ListAllProducts',
       desc:'Delegerar till repo.ListAllProducts().',
       code:'[HttpGet()]\npublic async Task<ActionResult> ListAllProducts()\n{\n    var products = await repo.ListAllProducts();\n    return Ok(new { Success = true, StatusCode = 200,\n        Items = products.Count, Data = products });\n}'},
      {verb:'GET',route:'api/products/{id}',name:'FindProduct',
       desc:'Hämtar via ID. 404 om exception kastas.',
       code:'[HttpGet("{id}")]\npublic async Task<ActionResult> FindProduct(int id)\n{\n    try {\n        var product = await repo.FindProduct(id);\n        return Ok(new { Success = true, Data = product });\n    }\n    catch { return NotFound(); }\n}'},
      {verb:'POST',route:'api/products',name:'AddProduct',
       desc:'Skapar produkt. CreatedAtAction genererar Location-header.',
       code:'[HttpPost()]\npublic async Task<ActionResult> AddProduct(PostProductDto product)\n{\n    try {\n        var id = await repo.AddProduct(product);\n        return CreatedAtAction(nameof(FindProduct), new { id }, product);\n    }\n    catch (Exception ex) { return StatusCode(500, ex.Message); }\n}'}
    ]
  },
  CustCtrl: {
    title:'CustomersController', file:'Controllers/CustomersController.cs',
    tagCls:'tctrl', tagLbl:'Controller', route:'api/customers',
    desc:'Full CRUD för kunder. GET (lista + detalj), POST, PUT, DELETE. Returnerar DTOs.',
    methods:[
      {verb:'GET',route:'api/customers',name:'ListAllCustomers',
       desc:'Hämtar alla kunder med collection expression-syntax.',
       code:'[HttpGet()]\npublic async Task<ActionResult> ListAllCustomers()\n{\n    var items = await context.Customers.ToListAsync();\n    List<GetAllCustomersDto> customers = [.. items.Select(c => new GetAllCustomersDto() {\n        CustomerId = c.CustomerId,\n        FirstName = c.FirstName,\n        LastName = c.LastName\n    })];\n    return Ok(new { Success = true, Items = customers.Count, Data = customers });\n}'},
      {verb:'POST',route:'api/customers',name:'AddCustomer',
       desc:'Skapar ny kund.',
       code:'[HttpPost()]\npublic async Task<ActionResult> AddCustomer(PostCustomerDto model)\n{\n    Customer customer = new() {\n        FirstName = model.FirstName,\n        LastName = model.LastName,\n        Email = model.Email\n    };\n    context.Customers.Add(customer);\n    await context.SaveChangesAsync();\n    return StatusCode(201, customer);\n}'},
      {verb:'PUT',route:'api/customers/{id}',name:'UpdateCustomer',
       desc:'Uppdaterar. Change Tracker genererar UPDATE. Returnerar 204.',
       code:'[HttpPut("{id}")]\npublic async Task<ActionResult> UpdateCustomer(int id, PutCustomerDto model)\n{\n    Customer customer = await context.Customers.FindAsync(id);\n    if (customer is null) return NotFound(new { Message = "Hittade ingen kund" });\n    customer.FirstName = model.FirstName;\n    customer.LastName = model.LastName;\n    customer.Email = model.Email;\n    await context.SaveChangesAsync();\n    return NoContent();\n}'},
      {verb:'DELETE',route:'api/customers/{id}',name:'DeleteCustomer',
       desc:'Idempotent — returnerar alltid 204.',
       code:'[HttpDelete("{id}")]\npublic async Task<ActionResult> DeleteCustomer(int id)\n{\n    Customer customer = await context.Customers.FindAsync(id);\n    if (customer is not null) {\n        context.Customers.Remove(customer);\n        await context.SaveChangesAsync();\n    }\n    return NoContent();\n}'}
    ]
  },
  PayCtrl: {

    methods:[
      {verb:'—',route:'CreateToken',name:'CreateToken',desc:'Claims → roller → nyckel → credentials → JwtSecurityToken → WriteToken.',
       code:'public async Task<string> CreateToken(User user)\n{\n    List<Claim> claims = [\n        new(ClaimTypes.Email, user.Email),\n        new(ClaimTypes.Name, user.UserName),\n        new("FirstName", user.FirstName),\n        new("Id", user.Id)\n    ];\n    var roles = await userManager.GetRolesAsync(user);\n    foreach (var role in roles)\n        claims.Add(new(ClaimTypes.Role, role));\n\n    var key = new SymmetricSecurityKey(\n        Encoding.UTF8.GetBytes(config["tokenSettings:tokenKey"]));\n    var credentials = new SigningCredentials(key, SecurityAlgorithms.HmacSha512);\n\n    var token = new JwtSecurityToken(\n        claims: claims,\n        expires: DateTime.Now.AddDays(5),\n        signingCredentials: credentials);\n    return new JwtSecurityTokenHandler().WriteToken(token);\n}'}

   code:'// Cart har navigeringsegenskaper\npublic class Cart\n{\n    public int CartId { get; set; }\n    public int CustomerId { get; set; }      // FK\n    [ForeignKey("CustomerId")]\n    public Customer Customer { get; set; }   // Nav. prop\n    public List<CartItem> CartItems { get; set; } // Nav. prop\n}\n\n// UTAN .Include() → null!\nCart cart = await context.Carts.FindAsync(id);\n// cart.Customer == null  ← KRASCHAR!\n\n// MED .Include() → JOINs körs\nCart cart = await context.Carts\n    .Include(c => c.Customer)   // LEFT JOIN Customers\n    .Include(c => c.CartItems)  // LEFT JOIN CartItems\n    .SingleOrDefaultAsync(c => c.CartId == id);\n// Nu fungerar: cart.Customer.FirstName',

  {id:'genericrepo',title:'Generic Repository (Lektion 13)',tags:['generic repository','igenericrepository','genericrepository','baseeentity','generics','automapper'],category:'Designmönster',
   desc:'Generic Repository generaliserar Repository Pattern — en enda implementation hanterar alla entity-typer via generics. AutoMapper sköter mappningen Entity → DTO automatiskt.',
   projectRef:'Interfaces/IGenericRepository.cs, Repositories/GenericRepository.cs, Helpers/MappingProfiles.cs',
   code:'// IGenericRepository<T> — ett interface för ALLA entities\npublic interface IGenericRepository<T> where T : BaseEntity\n{\n    Task<IReadOnlyList<T>> ListAllAsync();\n    Task<T> FindByIdAsync(int id);\n    void Add(T entity);\n    void Update(T entity);\n    void Delete(T entity);\n    Task<T> FindAsync(Expression<Func<T, bool>> predicate);\n    Task<bool> SaveAllAsync();\n}\n\n// GenericRepository<T> — EN klass för ALLA entities\npublic class GenericRepository<T>(EShopContext context) : IGenericRepository<T>\n    where T : BaseEntity\n{\n    public async Task<IReadOnlyList<T>> ListAllAsync()\n        => await context.Set<T>().ToListAsync();\n\n    public async Task<T> FindByIdAsync(int id)\n        => await context.Set<T>().FindAsync(id);\n\n    public void Add(T entity) => context.Set<T>().Add(entity);\n    public async Task<bool> SaveAllAsync()\n        => await context.SaveChangesAsync() > 0;\n}\n\n// AutoMapper — automatisk Entity -> DTO-mappning\npublic class MappingProfiles : Profile\n{\n    public MappingProfiles()\n    {\n        CreateMap<PostProductDto, Product>()\n            .ForMember(d => d.ProductName, m => m.MapFrom(s => s.Name));\n        CreateMap<Product, GetProductsDto>()\n            .ForMember(d => d.Name, m => m.MapFrom(s => s.ProductName));\n    }\n}',

// ─── STATE ────────────────────────────────────────────────────────────────────
let curPage = 'overview';
let aiOpen = false;

// ─── SEARCH ───────────────────────────────────────────────────────────────────
document.getElementById('SI').addEventListener('input', function() {
  const v = this.value.trim();
  document.getElementById('CLR').classList.toggle('on', v.length > 0);
  if (v.length >= 1) doSearch(v);
  else showPage(curPage);
});

function clrSearch() {
  document.getElementById('SI').value = '';
  document.getElementById('CLR').classList.remove('on');
  showPage(curPage);
}

function doSearch(q) {
  const ql = q.toLowerCase().trim();
  const concept = CONCEPTS.find(c => c.tags.includes(ql) || c.id === ql || c.title.toLowerCase() === ql);
  if (concept) { renderConceptPage(concept); return; }
  const scored = IDX.map(item => {
    let s = 0;
    const tl = item.title.toLowerCase();
    const tx = (item.text||'').toLowerCase();
    const tg = (item.tags||'').toLowerCase();
    if (tl === ql) s += 100;
    else if (tl.startsWith(ql)) s += 60;
    else if (tl.includes(ql)) s += 40;
    if (tg.includes(ql)) s += 35;
    if (tx.includes(ql)) s += 20;
    return {...item, score:s};
  }).filter(i => i.score > 0).sort((a,b) => b.score - a.score);
  renderSearchResults(q, scored);
}

function hl2(t, q) {
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return H(t).replace(re, '<mark>$1</mark>');
}

function renderSearchResults(q, results) {
  setNav(null);
  const main = document.getElementById('MAIN');
  if (!results.length) {
    main.innerHTML = '<div class="ptit">Sökning: "' + H(q) + '"</div><div class="psub">Inga träffar. Prova: async, dto, interface, record, linq, jwt, repository</div>';
    return;
  }
  let html = '<div class="ptit">Sökning: "' + H(q) + '"</div>';
  html += '<div class="rh">Hittade <strong>' + results.length + '</strong> resultat</div>';
  results.slice(0,18).forEach(r => {
    html += '<div class="ri" onclick="goRes(\'' + r.type + '\',\'' + r.key + '\',\'' + encodeURIComponent(r.methodName||'') + '\')">';
    html += '<div class="ritit"><span class="tag ' + r.tagCls + '" style="font-size:9px">' + r.tag + '</span>';
    html += hl2(r.title, q) + '</div>';
    html += '<div class="risub">' + hl2((r.text||'').slice(0,130), q) + '</div>';
    html += '</div>';
  });
  main.innerHTML = html;
  main.scrollTop = 0;
}

function goRes(type, key, methodName) {
  document.getElementById('SI').value = '';
  document.getElementById('CLR').classList.remove('on');
  if (type === 'concept') {
    const c = CONCEPTS.find(x => x.id === key);
    if (c) renderConceptPage(c);
  } else {
    showPage(key);
    if (methodName) {
      const dec = decodeURIComponent(methodName);
      setTimeout(() => {
        document.querySelectorAll('.mname').forEach(el => {
          if (el.textContent.trim() === dec) {
            el.closest('.mhd')?.click();
            el.closest('.method')?.scrollIntoView({behavior:'smooth', block:'center'});
          }
        });
      }, 150);
    }
  }
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function setNav(key) {
  document.querySelectorAll('.si').forEach(el => el.classList.remove('act'));
  if (key) { const n = document.getElementById('n-' + key); if(n) n.classList.add('act'); }
}

function nav(key) {
  document.getElementById('SI').value = '';
  document.getElementById('CLR').classList.remove('on');
  showPage(key);
}

function showPage(key) {
  curPage = key;
  setNav(key);
  const main = document.getElementById('MAIN');
  if      (key === 'overview') main.innerHTML = renderOverview();
  else if (key === 'folders')  main.innerHTML = renderFolders();
  else if (key === 'concepts') main.innerHTML = renderAllConcepts();
  else if (key === 'lessons')  main.innerHTML = renderLessons();
  else if (key === 'postman')  { main.innerHTML = renderPostman(); }
  else if (key === 'videos')   main.innerHTML = renderVideos();
  else if (PAGES[key])         main.innerHTML = renderPageFull(PAGES[key]);
  main.scrollTop = 0;
}

// ─── PAGE RENDERERS ───────────────────────────────────────────────────────────
function renderPageFull(p) {
  let html = '<div class="ptit">' + H(p.title) + '</div>';

function downloadPmCollection(key) {
  const col = PM_FULL[key];
  if (!col) return;
  const name = key === 'main' ? 'E-Shop' : 'E-Shop-Lektion13';
  const blob = new Blob([JSON.stringify(col, null, 2)], {type:'application/json'});

function buildRequestCards(flatList, baseUrl) {
  const vColor = {GET:'#3ecf8e',POST:'#4d7cfe',PUT:'#f5a623',DELETE:'#f03e3e',PATCH:'#22d3ee'};
  const vBg    = {GET:'rgba(62,207,142,.12)',POST:'rgba(77,124,254,.12)',PUT:'rgba(245,166,35,.12)',DELETE:'rgba(240,62,62,.12)',PATCH:'rgba(34,211,238,.12)'};
  const folders = {};
  flatList.forEach(r => {
    if (!folders[r.folder]) folders[r.folder] = [];
    folders[r.folder].push(r);
  });
  let html = '';
  Object.entries(folders).forEach(([fname, reqs]) => {
    html += '<div style="margin-bottom:18px">';
    html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--b1)">' + H(fname) + ' <span style="font-family:var(--mono);font-size:10px;color:var(--txm)">' + reqs.length + ' requests</span></div>';
    html += '<div style="display:flex;flex-direction:column;gap:7px">';
    reqs.forEach((req, i) => {
      const displayUrl = req.url.replace('{{url}}', baseUrl + '/api');
      const col = vColor[req.method] || '#94a3b8';
      const bg  = vBg[req.method]   || 'rgba(100,116,139,.1)';
      const safeKey = (fname + '_' + i).replace(/[^a-zA-Z0-9_]/g,'_');
      html += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:9px;overflow:hidden">';
      html += '<div style="padding:10px 14px;display:flex;align-items:flex-start;gap:10px">';
      html += '<span style="background:' + bg + ';color:' + col + ';font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;width:52px;text-align:center;flex-shrink:0;margin-top:1px">' + H(req.method) + '</span>';
      html += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;margin-bottom:2px">' + H(req.name) + '</div>';
      html += '<div style="font-family:var(--mono);font-size:11px;color:var(--txm);word-break:break-all">' + H(displayUrl) + '</div>';
      if (req.hasTests) html += '<div style="font-size:11px;color:var(--green);margin-top:2px">&#10003; Postman-tester inkluderade</div>';
      html += '</div>';
      html += '<button data-key="' + safeKey + '" onclick="cpPmReq(this,PM_FLAT[currentPmTab])" style="background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:5px 10px;color:var(--txd);font-family:var(--sans);font-size:11px;cursor:pointer;flex-shrink:0">Kopiera</button>';
      html += '</div>';
      if (req.body) {
        html += '<div style="border-top:1px solid var(--b1);padding:9px 14px;background:#080a0f">';
        html += '<pre style="font-family:var(--mono);font-size:11.5px;color:#c9d1e0;margin:0;overflow-x:auto;line-height:1.6">' + H(req.body) + '</pre>';
        html += '</div>';
      }
      if (req.hasTests && req.testCode) {
        html += '<div style="border-top:1px solid var(--b1);padding:9px 14px">';
        html += '<div style="font-size:10px;color:var(--green);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Postman Tests</div>';
        html += '<pre style="font-family:var(--mono);font-size:11px;color:#86efac;margin:0;overflow-x:auto;line-height:1.6;opacity:.8">' + H(req.testCode) + '</pre>';
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

// Build key map for copy buttons
const PM_KEY_MAP = {};
['main','l13'].forEach(key => {
  const folders = {};
  (PM_FLAT[key]||[]).forEach(r => {
    if (!folders[r.folder]) folders[r.folder] = [];
    const safeKey = (r.folder + '_' + folders[r.folder].length).replace(/[^a-zA-Z0-9_]/g,'_');
    PM_KEY_MAP[safeKey] = r;
    folders[r.folder].push(r);
  });
});

let currentPmTab = 'main';

function cpPmReq(btn, flatList) {
  const key = btn.getAttribute('data-key');
  const req = PM_KEY_MAP[key];
  if (!req) return;
  const baseUrl = (document.getElementById('pm-baseurl')||{}).value || 'http://localhost:5001';
  const url = req.url.replace('{{url}}', baseUrl + '/api');
  let text = req.method + ' ' + url + '\nContent-Type: application/json\n';
  if (req.body) text += '\n' + req.body;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '\u2713 OK';
    setTimeout(() => btn.textContent = 'Kopiera', 1800);
    const t = document.createElement('div');
    t.textContent = '\u2713 ' + req.name;
    t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1e2330;border:1px solid #3ecf8e;border-radius:8px;padding:10px 16px;color:#3ecf8e;font-size:13px;z-index:9999;animation:fi .2s ease';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  });
}

function switchPmTab(key) {
  currentPmTab = key;
  const baseUrl = (document.getElementById('pm-baseurl')||{}).value || 'http://localhost:5001';
  const content = document.getElementById('pm-content');
  if (content) content.innerHTML = buildRequestCards(PM_FLAT[key]||[], baseUrl);
  ['main','l13'].forEach(k => {
    const btn = document.getElementById('pm-btn-' + k);
    if (!btn) return;
    if (k === key) { btn.style.background='var(--blue)'; btn.style.color='#fff'; }
    else { btn.style.background='var(--s2)'; btn.style.color='var(--txd)'; }
  });
}

  linq:'LINQ', record:'record', identity:'ASP.NET Identity', dto:'DTO', genericrepo:'Generic Repository'
};

function getVids(topic) {
  try { return JSON.parse(localStorage.getItem('yt_' + topic) || '[]'); } catch { return []; }
}
function saveVid(topic, id, title) {
  const vids = getVids(topic);
  if (!vids.find(v => v.id === id)) vids.push({id, title});
  localStorage.setItem('yt_' + topic, JSON.stringify(vids));
}
function rmVid(topic, id) {
  const vids = getVids(topic).filter(v => v.id !== id);
  localStorage.setItem('yt_' + topic, JSON.stringify(vids));
}

function renderYtSection(topic) {
  const vids = getVids(topic);
  const label = YT_TOPICS[topic] || topic;
  let html = '<div style="background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-top:14px" id="yts-' + topic + '">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:7px"><span style="color:#ff4444">&#9654;</span> Videos &mdash; ' + H(label) + '</div>';
  if (!vids.length) html += '<div style="font-size:12px;color:var(--txm);margin-bottom:8px">Inga videos tillagda &auml;nnu.</div>';
  vids.forEach(v => {
    html += '<a href="https://www.youtube.com/watch?v=' + H(v.id) + '" target="_blank" style="display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg);border:1px solid var(--b1);border-radius:7px;text-decoration:none;color:var(--tx);margin-bottom:6px">';
    html += '<div style="width:40px;height:28px;background:rgba(255,68,68,.15);border:1px solid rgba(255,68,68,.3);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#ff4444">&#9654;</div>';
    html += '<div style="flex:1"><div style="font-size:12.5px;font-weight:600">' + H(v.title||v.id) + '</div><div style="font-size:11px;color:var(--txd)">youtube.com/watch?v=' + H(v.id) + '</div></div>';
    html += '<button onclick="event.preventDefault();event.stopPropagation();rmVid(\'' + topic + '\',\'' + v.id + '\');document.getElementById(\'yts-' + topic + '\').outerHTML=renderYtSection(\'' + topic + '\')" style="background:none;border:none;color:var(--txm);cursor:pointer;font-size:16px;padding:0 4px">&#215;</button>';
    html += '</a>';
  });
  html += '<button onclick="document.getElementById(\'ytf-' + topic + '\').classList.toggle(\'open\')" style="background:rgba(255,68,68,.08);border:1px dashed rgba(255,68,68,.3);border-radius:7px;padding:8px 12px;cursor:pointer;font-size:12px;color:var(--txd);width:100%;text-align:left">&#43; L&auml;gg till video</button>';
  html += '<div id="ytf-' + topic + '" style="display:none;margin-top:8px;background:var(--s3);border-radius:8px;padding:12px">';
  html += '<div style="font-size:11.5px;color:var(--txd);margin-bottom:4px">Video-ID (fr&aring;n URL:en efter ?v=) eller hela URL:en:</div>';
  html += '<input id="ytid-' + topic + '" type="text" placeholder="t.ex. dQw4w9WgXcQ" style="width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--tx);outline:none;margin-bottom:8px"/>';
  html += '<input id="yttt-' + topic + '" type="text" placeholder="Titel (valfri)" style="width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:7px 10px;font-family:var(--sans);font-size:12px;color:var(--tx);outline:none;margin-bottom:8px"/>';
  html += '<button onclick="addVid(\'' + topic + '\')" style="background:var(--blue);border:none;border-radius:6px;padding:7px 14px;color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer">Spara</button>';
  html += '</div>';
  html += '<div style="font-size:10.5px;color:var(--txm);margin-top:8px">Kanal: <a href="https://www.youtube.com/@michaelgustavsson8645/playlists" target="_blank" style="color:var(--blue)">Michael Gustavsson &rarr;</a></div>';
  html += '</div>';
  return html;
}

function addVid(topic) {
  const rawId = (document.getElementById('ytid-' + topic)||{}).value?.trim() || '';
  const title = (document.getElementById('yttt-' + topic)||{}).value?.trim() || rawId;
  if (!rawId) return;
  const match = rawId.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  const vid = match ? match[1] : rawId;
  saveVid(topic, vid, title);
  const el = document.getElementById('yts-' + topic);
  if (el) el.outerHTML = renderYtSection(topic);
}

function renderVideos() {
  let html = '<div class="ptit">&#9654; YouTube Videos</div>';
  html += '<div class="psub">Spellista: SYS&Auml;25M-Programmering C# forts &middot; <a href="https://www.youtube.com/@michaelgustavsson8645/playlists" target="_blank" style="color:var(--blue)">Michael Gustavsson &rarr;</a></div>';
  html += '<div class="tip">&#43; L&auml;gg till ett video-ID under respektive &auml;mne. Visas automatiskt vid s&ouml;kning och i AI-chatten.</div>';
  Object.entries(YT_TOPICS).forEach(([key, label]) => {
    html += '<div class="card"><div class="chd"><div class="ctit">' + H(label) + '</div></div>';
    html += '<div class="cbd">' + renderYtSection(key) + '</div></div>';
  });
  return html;
}

// ─── GITHUB SYNC ──────────────────────────────────────────────────────────────
const GITHUB_REPO = 'Jensen-Courses/SYSA25M-CSharp-Forts';
let lastSha = null;

async function syncGithub() {
  const btn = document.getElementById('gh-btn');
  const status = document.getElementById('gh-status');
  if (!btn || !status) return;
  btn.disabled = true;
  btn.textContent = '&#8635; Hämtar...';
  status.innerHTML = '<span style="color:var(--blue)">Hämtar från GitHub...</span>';
  try {
    const res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/branches/main');
    const data = await res.json();
    const sha = data.commit?.sha;
    if (!sha) throw new Error('Kunde inte hämta branch-info');
    if (sha === lastSha) {
      status.innerHTML = '<span style="color:var(--green)">&#10003; Redan uppdaterad (commit: ' + sha.slice(0,7) + ')</span>';
    } else {
      lastSha = sha;
      const msg = data.commit?.commit?.message || '';
      status.innerHTML = '<span style="color:var(--green)">&#10003; Synkad! Commit: ' + sha.slice(0,7) + (msg ? ' &mdash; "' + H(msg.slice(0,60)) + '"' : '') + '</span>';
    }
  } catch(e) {
    status.innerHTML = '<span style="color:var(--red)">Fel: ' + H(e.message) + '</span>';
  }
  btn.disabled = false;
  btn.innerHTML = '&#8635; Synka';
}

  msgs.innerHTML += '<div class="msg ld" id="' + lid + '">T&auml;nker<span class="typing"></span></div>';
  msgs.scrollTop = msgs.scrollHeight;

  const sys = 'Du är en erfaren lärare i C# och ASP.NET Core. Svara ALLTID på svenska. Var pedagogisk.\n\nPROJEKTET: eShop — ASP.NET Core, EF Core, SQLite/MySQL/PostgreSQL, JWT, ASP.NET Identity\nKURSEN: SYSA25M (Jensen Courses) — 13 lektioner, GitHub: Jensen-Courses/SYSA25M-CSharp-Forts\nLektion 13 nytt: Generic Repository (IGenericRepository<T> where T : BaseEntity) och AutoMapper (MappingProfiles)\nArchitecture: Controllers → Interfaces → Repositories → EShopContext → DB\nC# 12: Primary Constructors, Collection expressions, null-coalescing throw\n\nSvara med: 1) Förklaring på svenska, 2) Kodsnutt från projektet i ```csharp, 3) Vilken fil det gäller';

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, system:sys, messages:[{role:'user',content:msg}]})
    });
    const d = await r.json();
    document.getElementById(lid)?.remove();
    let txt = (d.content||[]).map(b => b.text||'').join('') || 'Kunde inte hämta svar.';
    txt = H(txt)
      .replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => '<pre>' + H(c.trim()) + '</pre>')
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    msgs.innerHTML += '<div class="msg bot">' + txt + '</div>';
  } catch(e) {
    document.getElementById(lid)?.remove();
    msgs.innerHTML += '<div class="msg bot" style="color:var(--red)">Fel: ' + H(e.message) + '</div>';
  }
  btn.disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}
